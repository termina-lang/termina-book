site_name: The Termina Book
site_description: A programming language for real-time critical systems
site_url: https://termina-lang.org/book/
repo_url: https://github.com/termina-lang/termina
repo_name: termina-lang/termina
copyright: "&copy; The Termina Project Contributors"

nav:
  - Home: index.md
  - Foreword: foreword.md
  - Getting Started:
    - Installation: started/install.md
    - Hello, Real-Time World!: started/hello-world.md
  - Building Our First Application:
    - A Guided Tour: tutorial.md
  - Language Basics:
    - Types and Constants: basics/types.md
    - Variables and Mutability: basics/variables.md
    - Expressions and Operators: basics/expressions.md
    - Control Flow: basics/control-flow.md
    - Functions: basics/functions.md
    - References: basics/references.md
  - The Reactive Model:
    - Overview: reactive/overview.md
    - Resource Classes: reactive/resource-classes.md
    - Task Classes: reactive/task-classes.md
    - Handler Classes: reactive/handler-classes.md
  - Communication and Memory:
    - Ports and Channels: comm/ports-and-channels.md
    - Memory Management: comm/memory.md
  - Systems and Platforms:
    - The Application Module: wiring/application-module.md
    - Memory-Mapped I/O: advanced/memory-mapped-io.md
    - Platforms and the OSAL: platforms/osal.md
  - Tooling:
    - Project Structure and Build System: tooling/project-structure.md
    - Debugging: tooling/debugging.md
  - Appendix:
    - A. Keywords: appendix/keywords.md
    - B. Operators and Symbols: appendix/operators.md
    - C. Built-in Types and Classes: appendix/builtins.md
    - D. Naming Conventions: appendix/conventions.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo_termina.png
  favicon: assets/logo_termina.png
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - search.suggest

extra_css:
  - stylesheets/termina.css

extra_javascript:
  - javascripts/lightbox.js

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
